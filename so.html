<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Opname - Fitra Frozen Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1E3A8A;
            --accent-blue: #3B82F6;
            --bg-light: #F3F4F6;
            --white: #FFFFFF;
            --danger: #EF4444;
            --success: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); overflow-x: hidden; }

        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .back-btn { color: var(--white); font-size: 1.3rem; text-decoration: none; margin-right: 15px; transition: color 0.3s;}
        .back-btn:hover { color: #DBEAFE; }
        .header-title { font-size: 1.1rem; font-weight: 600; }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            width: 100%;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .header-opname {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: hidden; /* Mencegah scroll nganggu */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            table-layout: auto;
        }

        th {
            background-color: var(--bg-light);
            padding: 12px;
            text-align: left;
            font-size: 0.9rem;
            color: var(--primary-blue);
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #E5E7EB;
            vertical-align: middle;
        }

        .input-stok {
            width: 80px;
            padding: 8px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            outline: none;
        }
        .input-stok:focus { border-color: var(--accent-blue); }

        .selisih {
            font-weight: 600;
        }

        .negatif { color: var(--danger); }
        .positif { color: var(--success); }

        .btn-simpan {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            float: right;
            transition: 0.3s;
        }

        .btn-simpan:hover { opacity: 0.8; transform: translateY(-2px); }

        .search-box {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            outline: none;
        }
        .search-box:focus { border-color: var(--accent-blue); }

        /* KHUSUS HP BIAR FIT 100% TANPA SWIPE */
        @media (max-width: 768px) {
            .container { padding: 10px; margin: 10px auto; }
            .card { padding: 12px; }
            .header-opname { flex-direction: column; align-items: stretch; gap: 10px; margin-bottom: 15px; }
            .search-box { max-width: 100%; font-size: 0.9rem; padding: 8px;}
            
            table { font-size: 11px; }
            th, td { 
                padding: 8px 4px; 
                word-wrap: break-word; 
                white-space: normal;
            }

            /* Atur lebar kolom persentase biar pas */
            th:nth-child(1), td:nth-child(1) { width: 45%; font-weight: 600; line-height: 1.2; } /* Nama */
            th:nth-child(2), td:nth-child(2) { width: 20%; text-align: center; } /* Stok Sistem */
            th:nth-child(3), td:nth-child(3) { width: 20%; text-align: center; } /* Input Fisik */
            th:nth-child(4), td:nth-child(4) { width: 15%; text-align: center; } /* Selisih */

            /* Kecilin input box biar ga makan tempat */
            .input-stok { width: 50px; padding: 6px 2px; font-size: 11px; }
            
            /* Tombol simpan dibikin full kiri ke kanan di HP */
            .btn-simpan { float: none; width: 100%; font-size: 0.95rem; padding: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="header-title">Stok Opname</div>
    </header>

    <div class="container">
        <div class="card">
            <div class="header-opname">
                <div>
                    <h2 style="font-size: 1.2rem; color: var(--primary-blue);">Input Hasil Opname</h2>
                    <p style="font-size: 0.8rem; color: #666;" id="info-tgl"></p>
                </div>
                <input type="text" class="search-box" id="inputPencarianOpname" placeholder="Cari barang..." oninput="cariBarangOpname()">
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Barang</th>
                            <th style="text-align: center;">Sistem</th>
                            <th style="text-align: center;">Fisik</th>
                            <th style="text-align: center;">Selisih</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-stok">
                        <tr><td colspan="4" style="text-align:center; padding: 20px; color: #9ca3af;">Memuat data dari database...</td></tr>
                    </tbody>
                </table>
            </div>

            <button class="btn-simpan" id="btnSimpanOpname" onclick="simpanOpname()">
                <i class="fa-solid fa-floppy-disk"></i> SIMPAN PERUBAHAN
            </button>
            <div style="clear: both;"></div>
        </div>
    </div>

    <script src="produk.js"></script>

    <script>
        let dataInputFisik = {}; 

        function renderTabelOpname(data = daftarProduk) {
            const tbody = document.getElementById('tabel-stok');
            tbody.innerHTML = '';

            data.forEach((item) => {
                let nilaiFisik = dataInputFisik[item.id] !== undefined ? dataInputFisik[item.id] : "";
                let selisih = 0;
                let classWarna = "";
                let teksSelisih = "0";

                if(nilaiFisik !== "") {
                    selisih = nilaiFisik - item.stok;
                    teksSelisih = selisih;
                    if (selisih < 0) classWarna = "negatif";
                    else if (selisih > 0) classWarna = "positif";
                }

                // Pengaman nama barang
                let namaTampil = item.nama || item['nama barang'] || '-';

                tbody.innerHTML += `
                    <tr>
                        <td>${namaTampil}</td>
                        <td id="sistem-${item.id}" style="text-align: center;">${item.stok}</td>
                        <td style="text-align: center;">
                            <input type="number" class="input-stok" placeholder="0" value="${nilaiFisik}" 
                                oninput="hitungSelisih('${item.id}', this.value)">
                        </td>
                        <td id="selisih-${item.id}" class="selisih ${classWarna}" style="text-align: center;">${teksSelisih}</td>
                    </tr>
                `;
            });

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 20px; color:#9ca3af;">Barang tidak ditemukan</td></tr>`;
            }
        }

        window.onload = () => {
            if (typeof muatData === 'function') {
                muatData();
            } else {
                renderTabelOpname();
            }
        };

        function cariBarangOpname() {
            let keyword = document.getElementById('inputPencarianOpname').value.toLowerCase();
            let hasilCari = daftarProduk.filter(item => {
                let namaItem = item.nama || item['nama barang'] || "";
                return namaItem.toLowerCase().includes(keyword);
            });
            renderTabelOpname(hasilCari);
        }

        function hitungSelisih(idItem, nilaiFisik) {
            const itemTarget = daftarProduk.find(item => item.id == idItem);
            if (!itemTarget) return;

            dataInputFisik[idItem] = nilaiFisik === "" ? "" : parseInt(nilaiFisik);

            const stokSistem = itemTarget.stok;
            const fisik = nilaiFisik === "" ? stokSistem : parseInt(nilaiFisik);
            const selisih = fisik - stokSistem;
            
            const elemenSelisih = document.getElementById(`selisih-${idItem}`);
            elemenSelisih.innerText = selisih > 0 ? `+${selisih}` : selisih; // Kasih tanda + kalo lebih

            elemenSelisih.classList.remove('negatif', 'positif');
            if (selisih < 0) {
                elemenSelisih.classList.add('negatif');
            } else if (selisih > 0) {
                elemenSelisih.classList.add('positif');
            }
        }

        async function simpanOpname() {
            let adaPerubahan = false;
            for (let id in dataInputFisik) {
                if (dataInputFisik[id] !== "") adaPerubahan = true;
            }

            if (!adaPerubahan) {
                alert("Belum ada stok fisik yang diinput!");
                return;
            }

            if(confirm("Yakin data fisik udah benar? Stok di database akan mengikuti data fisik ini.")) {
                let btn = document.getElementById('btnSimpanOpname');
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> MENYIMPAN...';
                btn.style.opacity = '0.7';
                btn.disabled = true;

                try {
                    // Pakai Promise.all biar simpannya jalan barengan dan lebih cepet
                    let prosesSimpan = [];
                    for (let id in dataInputFisik) {
                        if (dataInputFisik[id] !== "") {
                            prosesSimpan.push(kirimKeCloud({ action: 'opname', id: id, stok: parseInt(dataInputFisik[id]) }));
                        }
                    }
                    
                    await Promise.all(prosesSimpan);

                    alert("Stok di database berhasil diperbarui!");
                    window.location.href = 'index.html'; 
                } catch (e) {
                    alert("Terjadi kesalahan saat menyimpan. Coba lagi.");
                    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> SIMPAN PERUBAHAN';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }
            }
        }

        const tgl = new Date();
        document.getElementById('info-tgl').innerText = "Tanggal Opname: " + tgl.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    </script>
</body>
</html>
